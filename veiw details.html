<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Drive Car Showroom</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
}

.hero{
background:url("https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=1600") center/cover;
height:400px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-shadow:2px 2px 8px black;
}

.hero h2{
font-size:50px;
}

.hero p{
font-size:22px;
margin:15px;
}

.cars{
padding:50px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:white;
width:300px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px gray;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card p{
margin-bottom:15px;
}

button{
background:black;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
}

button:hover{
background:red;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<h1>🚗 Royal Drive Car Showroom</h1>

<nav>
<a href="#">Home</a>
<a href="#">Cars</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h2>Drive Your Dream Car</h2>

<p>Luxury • Comfort • Performance</p>

</section>

<section class="cars">

<h2>Featured Cars</h2>

<br><br>

<div class="container">

<div class="card">

<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=700">

<h3>BMW M4</h3>

<p>₹95,00,000</p>

<a href="bmw.html">
<button>View Details</button>
</a>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=700">

<h3>Audi A6</h3>

<p>₹72,00,000</p>

<a href="bmw.html">
<button>View Details</button>
</a>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=700">

<h3>Mercedes C-Class</h3>

<p>₹80,00,000</p>

<a href="bmw.html">
<button>View Details</button>
</a>

</div>

</div>

</section>

<footer>

<h3>© 2026 Royal Drive Car Showroom</h3>

</footer>

</body>
</html>
